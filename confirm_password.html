<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="icon_web.svg" />
    <title>восстановление пароля</title>
</head>
<body>
    
    <a href="./entrance.html" class="igs_button_universal_A1 back_global">назад</a>
  <div class="center_block">
    <div class="width_block">
      <h1>
        восстановления пароля
      </h1>
      <h2>
        Введите имя, фамилию и номер телефона для восстановления пароля
      </h2>
      <span id="name_warning" class="warning">
        не введено имя
      </span>
      <span id="none_warning" class="warning">
        неверные имя, фамилия или номер телефона

      </span>
      <input id="name_input" class="receiving_data" type="text" placeholder="имя">
      <span id="surname_warning" class="warning">
        не введена фамилия
      </span>
      <input id="surname_input" class="receiving_data" type="text" placeholder="фамилия">
      <span id="phone_warning" class="warning">
        не введен номер телефона
      </span>
      <span id="phone_none_one_warning" class="warning">
        номер должени начинаться с (+7)
      </span>
      <input id="phone_input" class="receiving_data" type="tel" placeholder="номер телефона">
      <div style="display: flex;justify-content: center; margin-top: 20px;">
        <button id="buttonSend_confirm_password" class="igs_button_universal_B1">
          далее
        </button>
      </div>
    </div>
    <div class="photo_svg_3"></div>
  </div>


  <script type="module" src="./src/registration-entrance/local_script.ts"></script>
</body>
</html>
