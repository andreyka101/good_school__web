<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" crossorigin href="./src/interface_good_school.scss">
    <title>Document</title>
</head>

<body>
    <a href="./subscription_selection_start.html" class="igs_button_universal_A1 back_global">назад</a>
    <div>
        <h1>
            Настройте график расписаний под себя
        </h1>
    </div>
    <div class="flex_center">
        <div>
            <h2>
                текущая неделя
            </h2>

            <div class="timetable_classes_global_block">
                <div class="timetable_classes_scroll">
                    <div class="timetable_classes_up_day">
                        <div>
                            10.01
                        </div>
                        <span class="text_grid_day">
                            Пн
                        </span>
                        <span class="text_grid_day">
                            Вт
                        </span>
                        <span class="text_grid_day">
                            Ср
                        </span>
                        <span class="text_grid_day">
                            Чт
                        </span>
                        <span class="text_grid_day">
                            Пт
                        </span>
                        <span class="text_grid_day">
                            Сб
                        </span>
                        <span class="text_grid_day">
                            Вс
                        </span>
                    </div>
                    <div class="timetable_classes" id="timetable_classes_this_week">
                    </div>
                </div>
            </div>
        </div>
        <div>
            <h2>
                следующая неделя
            </h2>

            <div class="timetable_classes_global_block">
                <div class="timetable_classes_scroll">
                    <div class="timetable_classes_up_day">
                        <div>
                            10.01
                        </div>
                        <span class="text_grid_day">
                            Пн
                        </span>
                        <span class="text_grid_day">
                            Вт
                        </span>
                        <span class="text_grid_day">
                            Ср
                        </span>
                        <span class="text_grid_day">
                            Чт
                        </span>
                        <span class="text_grid_day">
                            Пт
                        </span>
                        <span class="text_grid_day">
                            Сб
                        </span>
                        <span class="text_grid_day">
                            Вс
                        </span>
                    </div>
                    <div class="timetable_classes" id="timetable_classes_next_week">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <h3>
        выберете время и день для урока
    </h3>
    <div class="flex_center">
        <button id="button_save" class="igs_button_universal_B1">
            сохранить
        </button>
    </div>
    <div class="information_time_global_block">
        <div class="information_block">
            <div class="time_none"></div>
            – свободное время, можно записаться
        </div>
        <div class="information_block">
            <div class="time_busyAlways"></div>
            – занято постоянно
        </div>
        <div class="information_block">
            <div class="time_work"></div>
            – ваше выбраное время
        </div>
        <div class="information_block">
            <div class="time_busyTemporarily"></div>
            – занято времено ,освободится на следующей неделе
        </div>
    </div>



    <script type="module" src="./src/setting_up_timetable_student/script_start.ts"></script>
</body>

</html>
