<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" crossorigin href="./src/interface_good_school.scss">
    <link rel="icon" type="image/svg+xml" href="icon_web.svg" />
    <title>восстановление пароля</title>
</head>

<body>

    <a href="./entrance.html" class="igs_button_universal_A1 back_global">назад</a>
    <div class="center_block">
        <div class="width_block">
            <h1>
                восстановления пароля
            </h1>
            <h2>
                придумайте новый пароль
            </h2>
            <span id="password_warning" class="warning">
                не введен пароль
            </span>
            <span id="password_min_8" class="warning">
                пароль слишком короткий
            </span>
            <span id="password_x0_err_warning" class="warning">
                сервер не отвечает
            </span>
            <input id="password_input" class="receiving_data" type="password" placeholder="пароль">
            <span id="repeatPassword_warning" class="warning">
                пароли не совпадают
            </span>
            <input id="repeatPassword_input" class="receiving_data" type="password" placeholder="повторите пароль">
            <div style="display: flex;justify-content: center; margin-top: 20px;">
                <button id="buttonSend_confirm_password_3" class="igs_button_universal_B1" style="width: 200px;">
                    сохранить пароль
                </button>
            </div>
        </div>
        <div class="photo_svg_3"></div>
    </div>


    <script type="module" src="./src/registration-entrance/local_script.ts"></script>
</body>

</html>
