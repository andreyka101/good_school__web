<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Group 11.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" crossorigin href="./src/interface_good_school.scss">
    <title>Vite + TS</title>
  </head>
  <body>
    <a href="./" class="igs_button_universal_A1 back_global">назад</a>
    <h1>
      Регистрация
    </h1>
    <div class="center_block">
      <div class="width_block" style="width: 240px;">
        <input id="name_input" class="receiving_data" type="text" placeholder="имя">
        <input id="surname_input" class="receiving_data" type="text" placeholder="фамилия">
        <input id="patronymic_input" class="receiving_data" type="text" placeholder="отчество">
        <select id="item_select" class="receiving_data"> 
          <option value="" disabled selected hidden>предмет</option>
          <option value="mathematics">Математик, Информатик</option>
          <option value="programming">Программист</option>
        </select>
      
      <input id="phone_input" class="receiving_data" type="tel" placeholder="номер телефона">
      <input id="email_input" class="receiving_data" type="email" placeholder="электронная почта">
      <textarea id="education_textarea" class="receiving_data" placeholder="образование" style="max-width: 216px; min-width: 216px;"></textarea>
      <textarea id="description_textarea" class="receiving_data" placeholder="кратко о учителе и ведение его урока" style="max-width: 216px; min-width: 216px;"></textarea>
      <input id="password_input" class="receiving_data" type="password" placeholder="пароль">
      <input id="repeatPassword_input" class="receiving_data" type="password" placeholder="повторите пароль">
    </div>
  </div>
  <div style="display: flex;justify-content: center;">
    <button id="buttonSend_registrationTeacher" class="igs_button_universal_B1">
      зарегистрироваться
    </button>
  </div>
      
      

    <script type="module" src="./src/registration-entrance/local_script.ts"></script>
  </body>
</html>
